<style>
        body {
            background-color: #000000;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {

            border-radius: 0;
        }

            border-color: #e11d48 !important;
            box-shadow: none !important;

<body class="text-on-background font-body-md antialiased min-h-screen flex items-center justify-center">
<!-- Main Container - Split Layout -->
<div class="w-full max-w-[1440px] h-screen md:h-[800px] flex flex-col md:flex-row bg-[#0B0B0B] overflow-hidden">
<!-- Left Side - Illustration (40% width on Desktop) -->
<div class="hidden md:flex md:w-[40%] bg-surface-container-lowest h-full relative border-r border-[#262626]">
<!-- Using the exact placeholder requested -->
<img alt="Melodify Audio Visualizer" class="absolute inset-0 w-full h-full object-cover opacity-90" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBw3H5jmY4upoO1VjByFNCrTHrgK5urR747xDNiX4erAg7-03QvA6EqKc4_4pZncersmFINdF0kOjQyTs3IIgKvvjqXU1kJsfNxKLMNirFbZYFkY3FG3LK_QpGi8wSxKP88et03BXV9y8J8eS_LYPBKH_NWAkrJYPZUdnhFYzKkRDzz77jdsCYQ1GQxKFzH33TB3XLTSyXleSH66eotAvQS5bvr9zmSEGV6gPVIzqecEybt6AiQfkuKXsOaQiHQ-1eQvqtxUPaOReg"/>
<div class="absolute bottom-10 left-10 z-10">
<h1 class="font-headline-xl text-headline-xl text-white mb-2">Melodify</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant max-w-[300px]">Professional grade audio management and analytics for serious creators.</p>
</div>
<!-- Subtle gradient overlay to blend edges -->
<div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
</div>
<!-- Right Side - Authentication Form (60% width on Desktop) -->
<div class="w-full md:w-[60%] flex items-center justify-center p-6 md:p-12 h-full bg-[#000000]">
<!-- Auth Card -->
<div class="w-full max-w-[440px] bg-[#0a0a0a] border border-[#262626] rounded-DEFAULT p-8">
<div class="mb-8">
<h2 class="font-headline-lg text-headline-lg text-white mb-2">Welcome Back</h2>
<p class="font-body-md text-body-md text-[#a3a3a3]">Enter your credentials to access your workspace.</p>
</div>
<form class="space-y-5">
<!-- Email Input -->
<div class="space-y-1">
<label class="block font-label-md text-label-md text-[#e5e5e5]" for="email">Email Address</label>
<input class="w-full bg-[#0a0a0a] border border-[#262626] rounded-DEFAULT px-4 py-3 text-white font-body-md text-body-md placeholder-[#525252] input-focus transition-colors" id="email" name="email" placeholder="creator@example.com" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="space-y-1">
<div class="flex justify-between items-center">
<label class="block font-label-md text-label-md text-[#e5e5e5]" for="password">Password</label>
<a class="font-body-sm text-body-sm text-[#a3a3a3] hover:text-white transition-colors" href="#">Forgot Password?</a>
</div>
<input class="w-full bg-[#0a0a0a] border border-[#262626] rounded-DEFAULT px-4 py-3 text-white font-body-md text-body-md placeholder-[#525252] input-focus transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Remember Me -->
<div class="flex items-center pt-2">
<input class="h-4 w-4 bg-[#0a0a0a] border-[#262626] rounded-sm text-primary-container focus:ring-0 focus:ring-offset-0 focus:outline-none cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-[#a3a3a3] cursor-pointer" for="remember-me">
                            Remember me for 30 days
                        </label>
</div>
<!-- Login Button -->
<button class="w-full bg-primary-container hover:bg-primary-container/90 text-white font-label-md text-label-md py-3 px-4 rounded-DEFAULT transition-colors mt-6 font-semibold tracking-wide" type="submit">
                        LOGIN
                    </button>
<!-- Divider -->
<div class="relative py-4">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-[#262626]"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-2 bg-[#0a0a0a] text-[#737373] font-label-sm text-label-sm">OR</span>
</div>
</div>
<!-- Google Sign In -->
<button class="w-full bg-black border border-[#262626] hover:bg-[#171717] text-white font-label-md text-label-md py-3 px-4 rounded-DEFAULT transition-colors flex items-center justify-center gap-3" type="button">
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                        Sign in with Google
                    </button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-[#a3a3a3]">
                        Don't have an account? 
                        <a class="text-white hover:text-primary-container transition-colors ml-1 font-medium" href="#">Sign Up</a>
</p>
</div>
</div>
</div>
</div>
</body></html>
