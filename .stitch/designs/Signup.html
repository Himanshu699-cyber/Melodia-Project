<style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        /* Custom Input Styles */
        input[type="text"], input[type="email"], input[type="password"] {
            background-color: #0a0a0a;
            border: 1px solid #262626;
            color: #ffffff;
            border-radius: 0; /* Sharp corners per guidance */
        }
        input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus {
            border-color: #e11d48;
            outline: none;
            box-shadow: none; /* 0px offset focus */
        }
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #0a0a0a inset !important;
            -webkit-text-fill-color: white !important;
        }
    </style>

<body class="flex items-center justify-center min-h-screen p-4 md:p-0">
<div class="flex w-full max-w-7xl min-h-[800px] border border-outline rounded-lg overflow-hidden bg-surface">
<!-- Left Side: Illustration (Hidden on mobile) -->
<div class="hidden md:flex md:w-2/5 flex-col bg-background relative overflow-hidden border-r border-outline">
<div class="absolute inset-0 z-0 opacity-80">
<img alt="" class="w-full h-full object-cover grayscale opacity-50 contrast-125 mix-blend-screen" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7LhFXqORqf9ySS4F064SaLq2hSgWyIH13yHLSvSpNOrWyr0azlnCgOx9h4AaDIbp79Vc1keicMB1w1YfEhw5BI91VamWe60iKkkHa_XVzgpIoLh3_cp14-m9srXGaNWUPfrpwZF17S8Nm5zoziDYjvFpTHRzdC3DbgOfNwMYR8U36OxXzpLa6cBfe2jHqyFNZAgDCkPZc1gYZ1zgcnmtuY5Ejk-BJHInVxZNUqsII_8n36dJe1uW9lJhhlmh8TqpA9qLIIBbfOgw"/>
</div>
<div class="relative z-10 p-xl flex flex-col justify-between h-full bg-gradient-to-b from-background/80 via-transparent to-background/90">
<div>
<h1 class="font-headline-xl text-headline-xl text-on-surface tracking-tight mb-sm">Music Sign-up</h1>
<p class="font-body-md text-body-md text-on-secondary-container max-w-xs">Join the platform built for serious creators and industry professionals.</p>
</div>
<div class="mt-auto">
<p class="font-headline-lg text-headline-lg text-primary">Unlock Premium Features</p>
</div>
</div>
</div>
<!-- Right Side: Authentication Card -->
<div class="w-full md:w-3/5 flex items-center justify-center p-lg md:p-xl lg:p-[64px] bg-[#0a0a0a]">
<div class="w-full max-w-md">
<div class="mb-xl text-center md:text-left">
<h2 class="font-headline-xl text-headline-xl text-on-surface mb-sm">Create Account</h2>
<p class="font-body-md text-body-md text-on-secondary-container">Enter your details to access the professional workspace.</p>
</div>
<form class="space-y-md">
<!-- Username -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface" for="username">Username</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm pointer-events-none text-on-secondary-container">
<span class="material-symbols-outlined text-[20px]">person</span>
</span>
<input class="w-full pl-xl py-sm font-body-md text-body-md transition-colors" id="username" name="username" placeholder="producer_name" type="text"/>
</div>
</div>
<!-- Email -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm pointer-events-none text-on-secondary-container">
<span class="material-symbols-outlined text-[20px]">mail</span>
</span>
<input class="w-full pl-xl py-sm font-body-md text-body-md transition-colors" id="email" name="email" placeholder="studio@example.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm pointer-events-none text-on-secondary-container">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<input class="w-full pl-xl py-sm font-body-md text-body-md transition-colors" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Confirm Password -->
<div class="space-y-xs">
<label class="block font-label-md text-label-md text-on-surface" for="confirm_password">Confirm Password</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-sm pointer-events-none text-on-secondary-container">
<span class="material-symbols-outlined text-[20px]">lock_reset</span>
</span>
<input class="w-full pl-xl py-sm font-body-md text-body-md transition-colors" id="confirm_password" name="confirm_password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="pt-sm">
<button class="w-full bg-primary hover:bg-primary/90 text-on-primary font-label-md text-label-md py-sm transition-colors duration-200" type="submit">
                            Create Account
                        </button>
</div>
</form>
<div class="mt-lg text-center md:text-left">
<p class="font-body-sm text-body-sm text-on-secondary-container">
                        Already have an account? 
                        <a class="text-primary hover:underline font-label-md text-label-md ml-xs" href="#">Login</a>
</p>
</div>
</div>
</div>
</div>
